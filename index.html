<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<title>Daily Fitness Tracker</title>
<style>
  :root {
    --accent: #0F6E56;
    --accent-light: #1a9970;
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1c1c1e;
    --text-secondary: #6e6e73;
    --border: #e5e5ea;
    --check-bg: #e8f5f1;
    --today-bg: rgba(15,110,86,0.06);
    --font: -apple-system, 'SF Pro Text', sans-serif;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card-bg: #1c1c1e;
      --text: #f2f2f7;
      --text-secondary: #8e8e93;
      --border: #2c2c2e;
      --check-bg: #0f2e25;
      --today-bg: rgba(15,110,86,0.12);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    max-width: 480px;
    margin: 0 auto;
    padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 32px);
    min-height: 100vh;
  }

  /* Header / Nav */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .nav-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 38px;
    height: 38px;
    font-size: 20px;
    color: var(--accent);
    cursor: pointer;
    font-family: var(--font);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }

  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  .week-title { text-align: center; }
  .week-title h1 { font-size: 19px; font-weight: 700; }
  .week-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* Score cards */
  .score-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .score-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 11px 8px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .score-card .val {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
  }

  .score-card .val.bonus { color: #e8950a; }

  .score-card .lbl {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 3px;
    font-weight: 500;
  }

  /* Progress bar */
  .progress-wrap {
    height: 7px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  /* Tracker table card */
  .tracker-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 14px;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    background: var(--accent);
    color: white;
    padding: 7px 3px;
    font-size: 10px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.02em;
  }

  thead th.act-col {
    text-align: left;
    padding-left: 10px;
    font-size: 11px;
  }

  thead th.today-col { color: #a8ffd8; font-weight: 800; }

  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 7px 3px;
    text-align: center;
    vertical-align: middle;
  }

  tbody td.act-col {
    text-align: left;
    padding-left: 10px;
    padding-right: 6px;
    font-size: 12px;
    line-height: 1.3;
    color: var(--text);
    width: 108px;
    min-width: 108px;
  }

  .pts-badge {
    display: block;
    font-size: 9px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  td.today-col { background: var(--today-bg); }

  /* Custom checkbox */
  .cb-wrap { display: flex; align-items: center; justify-content: center; }
  .cb-wrap input[type="checkbox"] { display: none; }

  .cb-wrap label {
    width: 27px;
    height: 27px;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: var(--bg);
    color: transparent;
    font-size: 14px;
    font-weight: 700;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }

  .cb-wrap input[type="checkbox"]:checked + label {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Earned column */
  td.earned-col {
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    min-width: 38px;
    width: 38px;
  }

  .bonus-sup {
    font-size: 9px;
    color: #e8950a;
    vertical-align: super;
    font-weight: 800;
  }

  /* Footer */
  tfoot td {
    padding: 8px 3px;
    text-align: center;
    font-weight: 700;
    font-size: 12px;
    color: var(--accent);
    background: var(--check-bg);
    border-top: 2px solid var(--accent);
  }

  tfoot td.act-col {
    text-align: left;
    padding-left: 10px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  tfoot td.today-col { background: var(--check-bg); }

  /* History */
  .history-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px;
    margin-bottom: 14px;
  }

  .history-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 5px;
    height: 80px;
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    cursor: pointer;
  }

  .bar-space {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-end;
  }

  .bar {
    width: 100%;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-height: 3px;
    opacity: 0.35;
    transition: opacity 0.2s;
  }

  .bar.active { opacity: 1; }

  .bar-lbl {
    font-size: 8px;
    color: var(--text-secondary);
    margin-top: 4px;
    text-align: center;
    white-space: nowrap;
  }

  /* Reset */
  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-size: 14px;
    color: #ff3b30;
    cursor: pointer;
    font-family: var(--font);
  }

  .reset-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<div class="week-nav">
  <button class="nav-btn" id="prevBtn">&#8249;</button>
  <div class="week-title">
    <h1>Daily Fitness Tracker</h1>
    <div class="week-label" id="weekLabel"></div>
  </div>
  <button class="nav-btn" id="nextBtn">&#8250;</button>
</div>

<div class="score-cards">
  <div class="score-card">
    <div class="val" id="scoreEarned">0</div>
    <div class="lbl">pts earned</div>
  </div>
  <div class="score-card">
    <div class="val" id="scorePct">0%</div>
    <div class="lbl">of 100</div>
  </div>
  <div class="score-card">
    <div class="val bonus" id="scoreBonus">0</div>
    <div class="lbl">bonus pts</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="tracker-card">
  <table>
    <thead>
      <tr id="headRow"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
    <tfoot>
      <tr id="footRow"></tr>
    </tfoot>
  </table>
</div>

<div class="history-card">
  <div class="history-title">7-Week History</div>
  <div class="bar-chart" id="barChart"></div>
</div>

<button class="reset-btn" id="resetBtn">Reset this week</button>

<script>
const KEY = 'mindful_tracker_v1';
const DAY_SHORT = ['F','S','S','M','T','W','T'];

const ACTS = [
  { id:'wake',     label:'Wake up 5:15',          pts:2, maxDays:5, max:10 },
  { id:'weigh',    label:'Weighed today',          pts:1, maxDays:5, max:5  },
  { id:'run',      label:'Run completed',          pts:5, maxDays:4, max:20 },
  { id:'strength', label:'Strength session',       pts:5, maxDays:2, max:10 },
  { id:'core',     label:'Stretch / core',         pts:1, maxDays:5, max:5  },
  { id:'dog',      label:'Dog walk',               pts:1, maxDays:5, max:5  },
  { id:'stress',   label:'Stress check-in (5 PM)', pts:1, maxDays:5, max:5  },
  { id:'dinner',   label:'Mindful dinner',         pts:3, maxDays:5, max:15 },
  { id:'snack',    label:'Mindful eve. snack',     pts:2, maxDays:5, max:10 },
  { id:'pema',     label:'Pema Chödrön reading',   pts:2, maxDays:5, max:10 },
  { id:'bed',      label:'In bed 9:15',            pts:1, maxDays:5, max:5  },
];

const MAX_PTS = ACTS.reduce((s,a) => s + a.max, 0); // 100

function loadData() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch { return {}; }
}
function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function getMon(date) { // weeks start Friday
  const d = new Date(date);
  d.setHours(0,0,0,0);
  const day = d.getDay();
  d.setDate(d.getDate() + (day >= 5 ? 5 - day : -(2 + day)));
  return d;
}

function wKey(mon) { return mon.toISOString().slice(0,10); }

function fmtWeek(mon) {
  const end = new Date(mon); end.setDate(end.getDate()+6);
  const o = {month:'short', day:'numeric'};
  return mon.toLocaleDateString('en-US',o) + ' – ' + end.toLocaleDateString('en-US',o);
}

let data = loadData();
let curMon = getMon(new Date());
const todayMon = getMon(new Date());

function wd(mon) {
  const k = wKey(mon);
  if (!data[k]) data[k] = {};
  return data[k];
}

function isChk(mon, aid, d) {
  const w = wd(mon);
  return !!(w[aid] && w[aid][d]);
}

function toggle(mon, aid, d) {
  const w = wd(mon);
  if (!w[aid]) w[aid] = {};
  w[aid][d] = !w[aid][d];
  saveData(data);
}

function weekScore(mon) {
  let total=0, bonus=0;
  ACTS.forEach(a => {
    let c=0;
    for(let d=0;d<7;d++) if(isChk(mon,a.id,d)) c++;
    const raw = c * a.pts;
    total += Math.min(raw, a.max);
    bonus += Math.max(0, raw - a.max);
  });
  return {total, bonus};
}

function actEarned(mon, a) {
  let c=0;
  for(let d=0;d<7;d++) if(isChk(mon,a.id,d)) c++;
  const raw = c * a.pts;
  return { earned: Math.min(raw, a.max), bonus: Math.max(0, raw - a.max) };
}

function dayTotals(mon) {
  const t=[0,0,0,0,0,0,0];
  ACTS.forEach(a => {
    for(let d=0;d<7;d++) if(isChk(mon,a.id,d)) t[d]+=a.pts;
  });
  return t;
}

function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }

function days(mon) {
  return Array.from({length:7}, (_,i) => {
    const d = new Date(mon); d.setDate(d.getDate()+i); return d;
  });
}

function render() {
  const mon = curMon;
  const isCurWeek = wKey(mon) === wKey(todayMon);
  const todayDate = today();

  // Week label
  document.getElementById('weekLabel').textContent =
    (isCurWeek ? 'This week · ' : '') + fmtWeek(mon);

  // Nav
  const nextMon = new Date(mon); nextMon.setDate(nextMon.getDate()+7);
  document.getElementById('nextBtn').disabled = nextMon > todayMon;

  // Scores
  const {total, bonus} = weekScore(mon);
  document.getElementById('scoreEarned').textContent = total + bonus;
  document.getElementById('scorePct').textContent = Math.round(total/MAX_PTS*100) + '%';
  document.getElementById('scoreBonus').textContent = bonus > 0 ? '+'+bonus : '0';
  document.getElementById('progressFill').style.width =
    Math.min(100, Math.round((total+bonus)/MAX_PTS*100)) + '%';

  const dayArr = days(mon);

  // Header
  const hr = document.getElementById('headRow');
  hr.innerHTML = '';
  const actTh = document.createElement('th');
  actTh.className = 'act-col';
  actTh.textContent = 'Activity';
  hr.appendChild(actTh);
  dayArr.forEach((d,i) => {
    const isToday = d.getTime()===todayDate.getTime();
    const th = document.createElement('th');
    th.textContent = DAY_SHORT[i];
    if(isToday) th.className = 'today-col';
    hr.appendChild(th);
  });
  const earnTh = document.createElement('th');
  earnTh.textContent = 'Pts';
  hr.appendChild(earnTh);

  // Body
  const tb = document.getElementById('tableBody');
  tb.innerHTML = '';
  ACTS.forEach(a => {
    const tr = document.createElement('tr');

    const nameTd = document.createElement('td');
    nameTd.className = 'act-col';
    nameTd.innerHTML = a.label + '<span class="pts-badge">' + a.pts + 'pt · max ' + a.max + '</span>';
    tr.appendChild(nameTd);

    dayArr.forEach((d,i) => {
      const isToday = d.getTime()===todayDate.getTime();
      const td = document.createElement('td');
      if(isToday) td.className='today-col';

      const cid = 'cb_'+a.id+'_'+i;
      const wrap = document.createElement('div'); wrap.className='cb-wrap';
      const inp = document.createElement('input'); inp.type='checkbox'; inp.id=cid;
      inp.checked = isChk(mon, a.id, i);
      inp.addEventListener('change', () => { toggle(mon,a.id,i); render(); });
      const lbl = document.createElement('label'); lbl.htmlFor=cid; lbl.textContent='✓';
      wrap.appendChild(inp); wrap.appendChild(lbl);
      td.appendChild(wrap);
      tr.appendChild(td);
    });

    const {earned, bonus:ab} = actEarned(mon,a);
    const etd = document.createElement('td');
    etd.className = 'earned-col';
    if(earned>0 || ab>0) {
      etd.textContent = earned || 0;
      if(ab>0) {
        const sup = document.createElement('span');
        sup.className='bonus-sup'; sup.textContent='+'+ab;
        etd.appendChild(sup);
      }
    } else {
      etd.textContent = '—';
    }
    tr.appendChild(etd);
    tb.appendChild(tr);
  });

  // Footer
  const fr = document.getElementById('footRow');
  fr.innerHTML = '';
  const lbTd = document.createElement('td'); lbTd.className='act-col'; lbTd.textContent='Day total';
  fr.appendChild(lbTd);
  const dt = dayTotals(mon);
  dayArr.forEach((d,i) => {
    const isToday = d.getTime()===todayDate.getTime();
    const td = document.createElement('td');
    if(isToday) td.className='today-col';
    td.textContent = dt[i] > 0 ? dt[i] : '—';
    fr.appendChild(td);
  });
  const totTd = document.createElement('td'); totTd.textContent = total+bonus;
  fr.appendChild(totTd);

  renderChart();
}

function renderChart() {
  const chart = document.getElementById('barChart');
  chart.innerHTML = '';
  const mondays = Array.from({length:7}, (_,i) => {
    const m = new Date(todayMon); m.setDate(m.getDate() - (6-i)*7); return m;
  });
  const scores = mondays.map(m => { const {total,bonus}=weekScore(m); return total+bonus; });
  const maxS = Math.max(...scores, MAX_PTS);

  mondays.forEach((m,i) => {
    const isActive = wKey(m)===wKey(curMon);
    const col = document.createElement('div'); col.className='bar-col';
    col.title = fmtWeek(m)+': '+scores[i]+' pts';
    col.addEventListener('click', () => { curMon=new Date(m); render(); });

    const sp = document.createElement('div'); sp.className='bar-space';
    const bar = document.createElement('div');
    bar.className = 'bar' + (isActive?' active':'');
    bar.style.height = Math.max(scores[i]/maxS*100, 3)+'%';
    sp.appendChild(bar);

    const lbl = document.createElement('div'); lbl.className='bar-lbl';
    lbl.textContent = m.toLocaleDateString('en-US',{month:'short',day:'numeric'});

    col.appendChild(sp); col.appendChild(lbl);
    chart.appendChild(col);
  });
}

document.getElementById('prevBtn').addEventListener('click', () => {
  curMon = new Date(curMon); curMon.setDate(curMon.getDate()-7); render();
});

document.getElementById('nextBtn').addEventListener('click', () => {
  const n = new Date(curMon); n.setDate(n.getDate()+7);
  if(n <= todayMon) { curMon=n; render(); }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm('Reset all data for this week?')) {
    delete data[wKey(curMon)]; saveData(data); render();
  }
});

render();
</script>
</body>
</html>
